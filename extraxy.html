    /* ── base & globals ── */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background:#F8FAFC; color:#0F172A; }
    .dark body { background:#0B1120; color:#F1F5F9; }
    /* glassmorphism */
    .glass { background: rgba(255,255,255,0.65); backdrop-filter: blur(16px) saturate(180%); border:1px solid rgba(255,255,255,0.3); }
    .dark .glass { background: rgba(30,41,59,0.7); border-color: rgba(255,255,255,0.06); }
    .glass-dark { background: rgba(15,23,42,0.7); backdrop-filter: blur(16px); border:1px solid rgba(255,255,255,0.08); }
    .dark .glass-dark { background: rgba(15,23,42,0.8); }
    /* gradient button */
    .btn-gradient { background: linear-gradient(135deg, #0E7C66, #22C55E); color:#fff; box-shadow:0 4px 20px rgba(14,124,102,0.3); transition:all 0.3s ease; }
    .btn-gradient:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(14,124,102,0.4); }
    .btn-outline { background:transparent; border:2px solid #0E7C66; color:#0E7C66; transition:all 0.3s ease; }
    .btn-outline:hover { background:#0E7C66; color:#fff; transform:translateY(-2px); }
    .dark .btn-outline { border-color:#18B79C; color:#18B79C; }
    .dark .btn-outline:hover { background:#18B79C; color:#0B1120; }
    /* reveal animation */
    .reveal { opacity:0; transform:translateY(40px); transition:all 0.8s cubic-bezier(0.22,1,0.36,1); }
    .reveal.visible { opacity:1; transform:translateY(0); }
    /* scrollbar */
    ::-webkit-scrollbar { width:8px; }
    ::-webkit-scrollbar-track { background:#f1f1f1; }
    ::-webkit-scrollbar-thumb { background:#0E7C66; border-radius:10px; }
    .dark ::-webkit-scrollbar-track { background:#1E293B; }
    .dark ::-webkit-scrollbar-thumb { background:#18B79C; }
    /* floating docs (reuse) */
    .floating-doc { position:absolute; background:rgba(255,255,255,0.8); backdrop-filter:blur(8px); border-radius:12px; padding:10px 16px; box-shadow:0 8px 32px rgba(0,0,0,0.06); border:1px solid rgba(255,255,255,0.3); font-size:0.7rem; font-weight:500; display:flex; align-items:center; gap:8px; animation:float 8s ease-in-out infinite; pointer-events:none; }
    .dark .floating-doc { background:rgba(30,41,59,0.8); border-color:rgba(255,255,255,0.06); }
    @keyframes float { 0%,100% { transform:translateY(0) rotate(0deg); } 50% { transform:translateY(-16px) rotate(2deg); } }
    @keyframes pulse-glow { 0%,100% { opacity:0.4; transform:scale(1); } 50% { opacity:0.8; transform:scale(1.05); } }
    /* particles */
    .particle { position:absolute; border-radius:50%; pointer-events:none; background:radial-gradient(circle, rgba(14,124,102,0.3), transparent); animation:float-particle 12s linear infinite; }
    @keyframes float-particle { 0% { transform:translate(0,0) scale(1); opacity:0; } 10% { opacity:0.6; } 90% { opacity:0.6; } 100% { transform:translate(var(--tx), var(--ty)) scale(0); opacity:0; } }
    /* faq */
    .faq-item { border-bottom:1px solid rgba(0,0,0,0.06); padding:20px 0; cursor:pointer; transition:all 0.3s ease; }
    .dark .faq-item { border-color:rgba(255,255,255,0.06); }
    .faq-item .faq-answer { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease; opacity:0; }
    .faq-item.open .faq-answer { max-height:200px; opacity:1; }
    .faq-item .faq-icon { transition:transform 0.3s ease; }
    .faq-item.open .faq-icon { transform:rotate(180deg); }

    const ThemeContext = React.createContext();

    const ThemeProvider = ({ children }) => {
      const [dark, setDark] = React.useState(() => {
        if (typeof window !== 'undefined') {
          const stored = localStorage.getItem('extraxy-theme');
          if (stored) return stored === 'dark';
          return window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        return false;
      });

      React.useEffect(() => {
        if (dark) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('extraxy-theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('extraxy-theme', 'light');
        }
      }, [dark]);

      const toggle = () => setDark(prev => !prev);

      return <ThemeContext.Provider value={{ dark, toggle }}>{children}</ThemeContext.Provider>;
    };

    const useTheme = () => React.useContext(ThemeContext);

                    <div className="flex items-center justify-between mb-3">
                      <span className="text-sm font-semibold text-text dark:text-white">Recent Documents</span>
                      <a href="#" className="text-xs font-medium text-primary dark:text-secondary hover:underline">View all</a>
                    </div>
                    <div className="space-y-2">
                      {recentDocs.map((doc,i) => (
                        <div key={i} className="flex items-center justify-between p-3 rounded-xl bg-bg dark:bg-[#0B1120] hover:bg-primary/5 dark:hover:bg-white/5 transition-colors">
                          <div className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-lg bg-primary/10 dark:bg-primary/20 flex items-center justify-center text-primary dark:text-secondary"><Icons.FileText size={14}/></div>
                            <div><div className="text-sm font-medium text-text dark:text-white">{doc.name}</div><div className="text-xs text-text/40 dark:text-gray-400">{doc.date}</div></div>
                          </div>
                          <span className={`text-xs font-semibold px-2.5 py-1 rounded-full ${doc.status==='Completed'?'bg-accent/10 text-accent':'bg-yellow-500/10 text-yellow-500'}`}>{doc.status}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="mt-6 pt-4 border-t border-black/5 dark:border-white/5">
                    <div className="flex items-center gap-2 text-xs text-text/40 dark:text-gray-400">
                      <Icons.Clock size={14}/> <span>Last activity: 2 minutes ago</span>
                      <span className="w-1 h-1 rounded-full bg-text/20 dark:bg-white/20"></span>
                      <span>1,284 documents processed today</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    };

    // ----- Login -----
    const Login = () => {
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const handleSubmit = (e) => {
        e.preventDefault();
        supabase.auth.signIn({ email, password });
      };
      return (
        <section className="pt-28 pb-20 md:pt-32 md:pb-28 flex items-center justify-center min-h-screen bg-bg dark:bg-bg">
          <Card className="w-full max-w-md">
            <h2 className="text-2xl font-bold text-text dark:text-white text-center">Welcome back</h2>
            <p className="text-sm text-text/50 dark:text-gray-400 text-center mt-1">Sign in to your Extraxy account</p>
            <form onSubmit={handleSubmit} className="mt-6 space-y-4">
              <div>
                <label className="block text-sm font-medium text-text/70 dark:text-gray-300">Email</label>
                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="mt-1 w-full px-4 py-2.5 rounded-xl border border-black/10 dark:border-white/10 bg-white/50 dark:bg-[#1E293B] text-text dark:text-white focus:outline-none focus:ring-2 focus:ring-primary" required />
              </div>
              <div>
                <label className="block text-sm font-medium text-text/70 dark:text-gray-300">Password</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="mt-1 w-full px-4 py-2.5 rounded-xl border border-black/10 dark:border-white/10 bg-white/50 dark:bg-[#1E293B] text-text dark:text-white focus:outline-none focus:ring-2 focus:ring-primary" required />
              </div>
              <Button variant="primary" className="w-full justify-center" type="submit">Sign In</Button>
            </form>
            <p className="mt-4 text-sm text-text/50 dark:text-gray-400 text-center">
              Don't have an account? <a href="/signup" className="text-primary dark:text-secondary hover:underline">Sign up</a>
            </p>
          </Card>
        </section>
      );
    };

    // ----- Signup -----
    const Signup = () => {
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const handleSubmit = (e) => {
        e.preventDefault();
        supabase.auth.signUp({ email, password });
      };
      return (
        <section className="pt-28 pb-20 md:pt-32 md:pb-28 flex items-center justify-center min-h-screen bg-bg dark:bg-bg">
          <Card className="w-full max-w-md">
            <h2 className="text-2xl font-bold text-text dark:text-white text-center">Create account</h2>
            <p className="text-sm text-text/50 dark:text-gray-400 text-center mt-1">Start your free trial today</p>
            <form onSubmit={handleSubmit} className="mt-6 space-y-4">
              <div>
                <label className="block text-sm font-medium text-text/70 dark:text-gray-300">Email</label>
                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="mt-1 w-full px-4 py-2.5 rounded-xl border border-black/10 dark:border-white/10 bg-white/50 dark:bg-[#1E293B] text-text dark:text-white focus:outline-none focus:ring-2 focus:ring-primary" required />
              </div>
              <div>
                <label className="block text-sm font-medium text-text/70 dark:text-gray-300">Password</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="mt-1 w-full px-4 py-2.5 rounded-xl border border-black/10 dark:border-white/10 bg-white/50 dark:bg-[#1E293B] text-text dark:text-white focus:outline-none focus:ring-2 focus:ring-primary" required />
              </div>
              <Button variant="primary" className="w-full justify-center" type="submit">Sign Up</Button>
            </form>
            <p className="mt-4 text-sm text-text/50 dark:text-gray-400 text-center">
              Already have an account? <a href="/login" className="text-primary dark:text-secondary hover:underline">Sign in</a>
            </p>
          </Card>
        </section>
      );
    };

    // ----- Upload -----
    const Upload = () => {
      const [files, setFiles] = React.useState([]);
      const handleDrop = (e) => {
        e.preventDefault();
        const dropped = Array.from(e.dataTransfer.files);
        setFiles(prev => [...prev, ...dropped]);
      };
      const handleUpload = async () => {
        for (const file of files) {
          await supabase.storage.from('documents').upload(`public/${file.name}`, file);
        }
        alert('Upload simulated. Check console.');
      };
      return (
        <section className="pt-28 pb-20 md:pt-32 md:pb-28 bg-bg dark:bg-bg">
          <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="text-center mb-12 reveal">
              <h1 className="text-3xl font-extrabold text-text dark:text-white">Upload Documents</h1>
              <p className="text-text/60 dark:text-gray-400 mt-2">Drag and drop or click to select files</p>
            </div>
            <Card className="p-8 md:p-12 text-center">
              <div className="border-2 border-dashed border-primary/30 dark:border-secondary/30 rounded-3xl p-12 transition-colors hover:border-primary dark:hover:border-secondary" onDragOver={(e) => e.preventDefault()} onDrop={handleDrop}>
                <Icons.Upload className="w-16 h-16 mx-auto text-primary dark:text-secondary opacity-60" />
                <p className="mt-4 text-text/60 dark:text-gray-400">Drop files here or <label className="text-primary dark:text-secondary cursor-pointer hover:underline">browse</label></p>
                <input type="file" multiple className="hidden" onChange={(e) => setFiles(prev => [...prev, ...Array.from(e.target.files)])} />
                {files.length > 0 && (
                  <div className="mt-6">
                    <p className="text-sm font-medium text-text dark:text-white">{files.length} file(s) selected</p>
                    <ul className="text-xs text-text/50 dark:text-gray-400 mt-2 space-y-1 max-h-40 overflow-y-auto">
                      {files.map((f,i) => <li key={i}>{f.name}</li>)}
                    </ul>
                  </div>
                )}
              </div>
              {files.length > 0 && (
                <Button variant="primary" className="mt-6" onClick={handleUpload}>Upload to Extraxy</Button>
              )}
            </Card>
          </div>
        </section>
      );
    };

    // ─────────────────────────────────────────────────────────────
    // 6. LAYOUT: Navbar & Footer (shared)
    // ─────────────────────────────────────────────────────────────
    const Navbar = () => {
      const { dark, toggle } = useTheme();
      const [mobileOpen, setMobileOpen] = React.useState(false);
      const { Link } = ReactRouterDOM;
      const navLinks = ['Home', 'Features', 'Solutions', 'Pricing', 'API', 'Integrations', 'Resources', 'FAQ', 'Contact'];
      return (
        <header className="fixed top-0 left-0 right-0 z-50 transition-all duration-300 glass dark:glass-dark">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16 md:h-20">
              <Link to="/" className="flex items-center gap-2.5 text-xl font-extrabold tracking-tight text-text dark:text-white flex-shrink-0">
                <Icons.Logo /> <span>Extraxy</span>
              </Link>
              <nav className="hidden lg:flex items-center gap-1 text-sm font-medium text-text/70 dark:text-gray-300">
                {navLinks.map(link => <Link key={link} to={`/#${link.toLowerCase()}`} className="px-3.5 py-2 rounded-xl hover:bg-primary/5 dark:hover:bg-white/5 transition-colors">{link}</Link>)}
              </nav>
              <div className="hidden lg:flex items-center gap-3">
                <button onClick={toggle} className="p-2 rounded-xl hover:bg-primary/5 dark:hover:bg-white/5 transition-colors text-text/60 dark:text-gray-400">
                  {dark ? <Icons.Sun /> : <Icons.Moon />}
                </button>
                <Link to="/login" className="px-5 py-2 rounded-xl text-sm font-semibold text-text/70 dark:text-gray-300 hover:text-primary dark:hover:text-secondary transition-colors">Sign In</Link>
                <Link to="/signup" className="btn-gradient px-6 py-2.5 rounded-xl text-sm font-semibold">Start Free</Link>
              </div>
              <div className="flex lg:hidden items-center gap-2">
                <button onClick={toggle} className="p-2 rounded-xl hover:bg-primary/5 dark:hover:bg-white/5 transition-colors text-text/60 dark:text-gray-400">
                  {dark ? <Icons.Sun /> : <Icons.Moon />}
                </button>
                <button onClick={() => setMobileOpen(!mobileOpen)} className="p-2 rounded-xl hover:bg-primary/5 dark:hover:bg-white/5 transition-colors text-text dark:text-white">
                  <Icons.Menu />
                </button>
              </div>
            </div>
            <div className={`lg:hidden overflow-hidden transition-all duration-500 ${mobileOpen ? 'max-h-[600px]' : 'max-h-0'}`}>
              <div className="py-4 border-t border-black/5 dark:border-white/5 space-y-1">
                {navLinks.map(link => <Link key={link} to={`/#${link.toLowerCase()}`} className="block px-4 py-3 rounded-xl text-sm font-medium text-text/70 dark:text-gray-300 hover:bg-primary/5 dark:hover:bg-white/5 transition-colors" onClick={() => setMobileOpen(false)}>{link}</Link>)}
                <div className="pt-3 px-4 flex flex-col gap-2">
                  <Link to="/login" className="text-center px-5 py-2.5 rounded-xl text-sm font-semibold text-text/70 dark:text-gray-300 hover:text-primary dark:hover:text-secondary transition-colors">Sign In</Link>
                  <Link to="/signup" className="btn-gradient text-center px-6 py-2.5 rounded-xl text-sm font-semibold">Start Free</Link>
                </div>
              </div>
            </div>
          </div>
        </header>
      );
    };

    const Footer = () => {
      const columns = [
        { title:'Product', links:['Features','Pricing','API','Integrations'] },
        { title:'Solutions', links:['Finance','Healthcare','Legal','Retail'] },
        { title:'Resources', links:['Documentation','Blog','Support','FAQ'] },
        { title:'Company', links:['About','Careers','Contact','Press'] },
        { title:'Legal', links:['Privacy Policy','Terms of Service','Cookie Policy'] },
      ];
      return (
        <footer className="bg-white dark:bg-[#0B1120] border-t border-black/5 dark:border-white/5">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-8 mb-12">
              <div className="col-span-2 md:col-span-1">
                <a href="/" className="flex items-center gap-2.5 text-xl font-extrabold text-text dark:text-white"><Icons.Logo /> Extraxy</a>
                <p className="mt-3 text-sm text-text/40 dark:text-gray-400 max-w-xs">AI document extraction made simple. Transform unstructured documents into structured data instantly.</p>
                <div className="mt-4 flex gap-3">
                  <a href="#" className="p-2 rounded-xl bg-bg dark:bg-[#1E293B] text-text/40 dark:text-gray-400 hover:text-primary dark:hover:text-secondary"><Icons.LinkedIn /></a>
                  <a href="#" className="p-2 rounded-xl bg-bg dark:bg-[#1E293B] text-text/40 dark:text-gray-400 hover:text-primary dark:hover:text-secondary"><Icons.Github /></a>
                  <a href="#" className="p-2 rounded-xl bg-bg dark:bg-[#1E293B] text-text/40 dark:text-gray-400 hover:text-primary dark:hover:text-secondary"><Icons.YouTube /></a>
                  <a href="#" className="p-2 rounded-xl bg-bg dark:bg-[#1E293B] text-text/40 dark:text-gray-400 hover:text-primary dark:hover:text-secondary"><Icons.Twitter /></a>
                </div>
              </div>
              {columns.map(col => (
                <div key={col.title}>
                  <h4 className="text-xs font-semibold uppercase tracking-wider text-text/40 dark:text-gray-400 mb-3">{col.title}</h4>
                  <ul className="space-y-2">
                    {col.links.map(link => <li key={link}><a href="#" className="text-sm text-text/50 dark:text-gray-400 hover:text-primary dark:hover:text-secondary transition-colors">{link}</a></li>)}
                  </ul>
                </div>
              ))}
            </div>
            <div className="pt-8 border-t border-black/5 dark:border-white/5 flex flex-col md:flex-row items-center justify-between gap-4 text-xs text-text/30 dark:text-gray-500">
              <span>© 2026 Extraxy. All rights reserved.</span>
              <div className="flex items-center gap-6">
                <a href="#" className="hover:text-primary dark:hover:text-secondary">Privacy</a>
                <a href="#" className="hover:text-primary dark:hover:text-secondary">Terms</a>
                <a href="#" className="hover:text-primary dark:hover:text-secondary">Cookies</a>
              </div>
            </div>
          </div>
        </footer>
      );
    };

    // ─────────────────────────────────────────────────────────────
    // 7. APP with Router
    // ─────────────────────────────────────────────────────────────
    const { BrowserRouter, Routes, Route } = ReactRouterDOM;

    const App = () => {
      React.useEffect(() => {
        // Reveal observer for sections
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.08 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        return () => observer.disconnect();
      }, []);

      return (
        <ThemeProvider>
          <BrowserRouter>
            <Navbar />
            <main>
              <Routes>
                <Route path="/" element={<Home />} />
                <Route path="/dashboard" element={<Dashboard />} />
                <Route path="/login" element={<Login />} />
                <Route path="/signup" element={<Signup />} />
                <Route path="/upload" element={<Upload />} />
              </Routes>
            </main>
            <Footer />
          </BrowserRouter>
        </ThemeProvider>
      );
    };

    // ─────────────────────────────────────────────────────────────
    // 8. RENDER
    // ─────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
